name: Update Snapshots

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9"
  ETHERPAD_DOMAIN: "${{ secrets.ETHERPAD_DOMAIN }}"

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4.0.0
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - name: Install
        run: pnpm install
      - name: Update snapshots
        run: pnpm run test:snapshot:update
      - name: Generate PR description
        id: description
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"

            ADDED=$(git diff --cached --name-status -- '*.snap' | grep '^A' | wc -l)
            DELETED=$(git diff --cached --name-status -- '*.snap' | grep '^D' | wc -l)
            MODIFIED=$(git diff --cached --name-status -- '*.snap' | grep '^M' | wc -l)

            FILE_LIST=""
            while IFS= read -r file; do
              [ -z "$file" ] && continue
              FILE_LIST="${FILE_LIST}- \`${file}\`"$'\n'
            done < <(git diff --cached --name-only -- '*.snap')

            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            {
              echo "body<<$EOF"
              echo "## Automated Snapshot Update"
              echo ""
              echo "This PR was automatically generated by the snapshot update workflow."
              echo ""
              echo "### Summary"
              echo ""
              echo "- **New snapshots**: ${ADDED} file(s) added"
              echo "- **Removed snapshots**: ${DELETED} file(s) removed"
              echo "- **Updated snapshots**: ${MODIFIED} file(s) modified"
              echo ""
              echo "### Changed files"
              echo ""
              echo "$FILE_LIST"
              echo "Please review the changed files in this PR for details on what changed."
              echo "$EOF"
            } >> "$GITHUB_OUTPUT"

            git reset
          fi
      - name: Create or update PR
        if: steps.description.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/update-snapshots
          commit-message: "chore: update snapshots"
          title: "chore: update snapshots"
          body: ${{ steps.description.outputs.body }}
          delete-branch: true
