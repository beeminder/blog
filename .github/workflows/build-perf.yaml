name: Build Performance

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9"
  ETHERPAD_DOMAIN: "${{ secrets.ETHERPAD_DOMAIN }}"
  NUM_RUNS: 3

permissions:
  pull-requests: write

jobs:
  build-perf:
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Checkout head commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: head

      - uses: pnpm/action-setup@v4.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "**/pnpm-lock.yaml"

      - name: Install dependencies (base)
        working-directory: base
        run: pnpm install

      - name: Install dependencies (head)
        working-directory: head
        run: pnpm install

      - name: Warm cache (base)
        working-directory: base
        run: pnpm run build

      - name: Time builds (base)
        id: base
        working-directory: base
        run: |
          TIMES=()
          for i in $(seq 1 ${{ env.NUM_RUNS }}); do
            START=$(date +%s%N)
            pnpm run build
            END=$(date +%s%N)
            ELAPSED=$(echo "scale=2; ($END - $START) / 1000000000" | bc)
            TIMES+=("$ELAPSED")
            echo "Base run $i: ${ELAPSED}s"
          done

          SUM="0"
          for t in "${TIMES[@]}"; do
            SUM=$(echo "$SUM + $t" | bc)
          done
          AVG=$(echo "scale=2; $SUM / ${{ env.NUM_RUNS }}" | bc)

          TIMES_STR=$(IFS=,; echo "${TIMES[*]}")
          echo "avg=$AVG" >> $GITHUB_OUTPUT
          echo "times=$TIMES_STR" >> $GITHUB_OUTPUT
          echo "Base average: ${AVG}s"

      - name: Warm cache (head)
        working-directory: head
        run: pnpm run build

      - name: Time builds (head)
        id: head
        working-directory: head
        run: |
          TIMES=()
          for i in $(seq 1 ${{ env.NUM_RUNS }}); do
            START=$(date +%s%N)
            pnpm run build
            END=$(date +%s%N)
            ELAPSED=$(echo "scale=2; ($END - $START) / 1000000000" | bc)
            TIMES+=("$ELAPSED")
            echo "Head run $i: ${ELAPSED}s"
          done

          SUM="0"
          for t in "${TIMES[@]}"; do
            SUM=$(echo "$SUM + $t" | bc)
          done
          AVG=$(echo "scale=2; $SUM / ${{ env.NUM_RUNS }}" | bc)

          TIMES_STR=$(IFS=,; echo "${TIMES[*]}")
          echo "avg=$AVG" >> $GITHUB_OUTPUT
          echo "times=$TIMES_STR" >> $GITHUB_OUTPUT
          echo "Head average: ${AVG}s"

      - name: Post build performance comment
        uses: actions/github-script@v7
        env:
          BASE_AVG: ${{ steps.base.outputs.avg }}
          HEAD_AVG: ${{ steps.head.outputs.avg }}
          BASE_TIMES: ${{ steps.base.outputs.times }}
          HEAD_TIMES: ${{ steps.head.outputs.times }}
          NUM_RUNS: ${{ env.NUM_RUNS }}
        with:
          script: |
            const baseAvg = parseFloat(process.env.BASE_AVG);
            const headAvg = parseFloat(process.env.HEAD_AVG);
            const baseTimes = process.env.BASE_TIMES;
            const headTimes = process.env.HEAD_TIMES;
            const numRuns = process.env.NUM_RUNS;
            const baseSha = '${{ github.event.pull_request.base.sha }}'.substring(0, 7);
            const headSha = '${{ github.event.pull_request.head.sha }}'.substring(0, 7);

            const diff = headAvg - baseAvg;
            const pct = ((diff / baseAvg) * 100).toFixed(1);
            const sign = diff >= 0 ? '+' : '';
            const emoji = diff <= -1 ? '🚀' : diff >= 1 ? '🐢' : '⚡';

            const marker = '<!-- build-perf-comment -->';
            const body = [
              marker,
              '## Build Performance',
              '',
              `${emoji} **${sign}${diff.toFixed(2)}s (${sign}${pct}%)** average build time`,
              '',
              `| | Base (\`${baseSha}\`) | Head (\`${headSha}\`) |`,
              '|---|---|---|',
              `| **Average** | ${baseAvg}s | ${headAvg}s |`,
              `| Runs | \`${baseTimes}\` | \`${headTimes}\` |`,
              '',
              `> ${numRuns} timed builds after one warm-up build per commit.`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
