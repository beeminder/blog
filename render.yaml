services:
  - type: web
    name: beeblog
    env: static
    # Install runs via the $RENDER-gated `prebuild` hook in package.json (single source of truth). See #657.
    buildCommand: pnpm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: redirect
        source: /feed
        destination: /feed.xml
      - type: redirect
        source: /rss
        destination: /feed.xml
      - type: redirect
        source: /rss.xml
        destination: /feed.xml
