services:
  - type: web
    name: beeblog
    env: static
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: redirect
        source: /feed
        destination: /feed.xml
      - type: redirect
        source: /rss
        destination: /feed.xml
      - type: redirect
        source: /rss.xml
        destination: /feed.xml
